<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Kaido</title>
    <link rel="icon" type="image/png" href="kaido-logo.png">
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F0F;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        a { color: inherit; text-decoration: none; }
        .logo { height: 44px; filter: brightness(0) invert(1); margin-bottom: 56px; }
        .code {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #FF9A3C 0%, #E8500A 52%, #C94208 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -.04em;
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 14px; color: #fff; }
        p { font-size: 16px; color: rgba(255,255,255,.45); line-height: 1.7; max-width: 400px; margin-bottom: 40px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 8px;
            font-size: 14px; font-weight: 700; transition: all .2s;
            cursor: pointer; font-family: inherit;
        }
        .btn-grad { background: linear-gradient(135deg, #FF9A3C, #E8500A); color: #fff; border: none; }
        .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,80,10,.35); }
        .btn-outline { background: transparent; color: rgba(255,255,255,.6); border: 1.5px solid rgba(255,255,255,.15); }
        .btn-outline:hover { border-color: rgba(255,255,255,.4); color: #fff; }
    </style>
</head>
<body>
    <a href="/"><img src="kaido-logo.png" alt="Kaido" class="logo"></a>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or may have been moved.</p>
    <div class="actions">
        <a href="/" class="btn btn-grad">Go to homepage →</a>
        <a href="/#contact" class="btn btn-outline">Book a free consultation</a>
    </div>
</body>
</html>
